<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordNews – Hacker News Word Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f6f6ef; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
    h1 { color: #ff6600; margin-bottom: 4px; }
    .subtitle { color: #666; margin-bottom: 20px; }
    .search-box { display: flex; gap: 8px; margin-bottom: 24px; }
    input { flex: 1; padding: 10px 14px; font-size: 16px; border: 2px solid #ddd; border-radius: 6px; }
    input:focus { outline: none; border-color: #ff6600; }
    button { padding: 10px 20px; font-size: 16px; background: #ff6600; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #e55d00; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .info { color: #666; margin-bottom: 12px; }
    .story { background: white; padding: 12px 16px; margin-bottom: 8px; border-radius: 6px; border-left: 3px solid #ff6600; }
    .story-title a { color: #333; text-decoration: none; font-weight: 500; }
    .story-title a:hover { color: #ff6600; }
    .story-meta { font-size: 13px; color: #888; margin-top: 4px; }
    .empty { text-align: center; padding: 40px; color: #888; }
    .error { color: #d32f2f; padding: 12px; background: #ffeaea; border-radius: 6px; }
    .spinner { display: none; text-align: center; padding: 20px; color: #888; }
  </style>
</head>
<body>
  <h1>WordNews</h1>
  <p class="subtitle">Search today's Hacker News stories for any word</p>

  <div class="search-box">
    <input type="text" id="word" placeholder="Enter a word (e.g. rust, ai, typescript)" />
    <button id="search-btn" onclick="doSearch()">Search</button>
  </div>

  <div id="spinner" class="spinner">Searching Hacker News...</div>
  <div id="results"></div>

  <script>
    const input = document.getElementById("word");
    const btn = document.getElementById("search-btn");
    const spinner = document.getElementById("spinner");
    const results = document.getElementById("results");

    input.addEventListener("keydown", (e) => { if (e.key === "Enter") doSearch(); });

    async function doSearch() {
      const word = input.value.trim();
      if (!word) return;

      btn.disabled = true;
      spinner.style.display = "block";
      results.innerHTML = "";

      try {
        const res = await fetch(`/api/search?word=${encodeURIComponent(word)}`);
        const data = await res.json();

        if (data.error) {
          results.innerHTML = `<div class="error">${data.error}</div>`;
          return;
        }

        if (data.stories.length === 0) {
          results.innerHTML = `<div class="empty">No stories mentioning "<strong>${word}</strong>" found on HN today (${data.date}).</div>`;
          return;
        }

        results.innerHTML = `<p class="info">Found <strong>${data.count}</strong> stories mentioning "<strong>${data.word}</strong>" today (${data.date}):</p>`;
        for (const s of data.stories) {
          const time = new Date(s.time * 1000).toLocaleTimeString();
          results.innerHTML += `
            <div class="story">
              <div class="story-title"><a href="${s.url}" target="_blank">${s.title}</a></div>
              <div class="story-meta">${s.score} points by ${s.by} at ${time} · <a href="https://news.ycombinator.com/item?id=${s.id}" target="_blank">comments</a></div>
            </div>`;
        }
      } catch (e) {
        results.innerHTML = `<div class="error">Request failed. Is the server running?</div>`;
      } finally {
        btn.disabled = false;
        spinner.style.display = "none";
      }
    }
  </script>
</body>
</html>
